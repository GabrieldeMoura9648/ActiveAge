<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Active Age - Agendar Consulta</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link href="css/style.css" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-white shadow-sm py-3">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="index.html">
          <img
            src="img/logo.png"
            alt="Active Age Logo"
            height="100"
            class="me-2"
          />
        </a>
        <div
          class="collapse navbar-collapse justify-content-end"
          id="navbarNav"
        >
          <ul class="navbar-nav"></ul>
        </div>
      </div>
    </nav>

    <div class="container my-5">
      <div class="row justify-content-center">
        <div class="col-lg-10">
          <a href="dashboard.html" class="btn btn-outline-secondary mb-3">
            <i class="bi bi-arrow-left"></i> Voltar para a busca
          </a>

          <div class="card shadow-sm border-0 mb-4" style="border-radius: 15px">
            <div class="card-body p-4 p-md-5">
              <div id="detalhes-medico">
                <p class="text-center">Carregando detalhes do médico...</p>
              </div>
            </div>
          </div>

          <div class="card shadow-sm border-0" style="border-radius: 15px">
            <div class="card-body p-4 p-md-5">
              <h2 class="h4 mb-4" style="color: var(--aa-brown)">
                Horários Disponíveis
              </h2>
              <div id="lista-horarios-disponiveis">
                <p class="text-center">Carregando horários...</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/agendar.js"></script>
  </body>
</html>
