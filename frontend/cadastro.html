<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Active Age - Seu Portal de Saúde</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link href="style.css" rel="stylesheet" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-white shadow-sm">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <img src="img/logo.png" alt="Active Age Logo" height="100" />
        </a>
      </div>
    </nav>

    <div class="container my-5">
      <div class="row justify-content-center">
        <div class="col-lg-7 col-md-9">
          <h1 class="text-center mb-4">Crie sua Conta</h1>
          <p class="text-center fs-5 mb-4">
            Bem-vindo ao Active Age! Vamos começar.
          </p>

          <div class="card shadow-sm border-0" style="border-radius: 15px">
            <div class="card-body p-4 p-md-5">
              <form id="formCadastro" action="/api/cadastrar" method="POST">
                <div class="mb-4">
                  <label class="form-label mb-2"
                    >Qual tipo de perfil você deseja criar?</label
                  >
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="radio"
                      name="tipoUsuario"
                      id="radioPaciente"
                      value="PACIENTE_CUIDADOR"
                      checked
                    />
                    <label class="form-check-label" for="radioPaciente">
                      Paciente ou Cuidador
                    </label>
                  </div>
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="radio"
                      name="tipoUsuario"
                      id="radioMedico"
                      value="MEDICO"
                    />
                    <label class="form-check-label" for="radioMedico">
                      Médico Geriatra (requer validação)
                    </label>
                  </div>
                </div>

                <div class="form-floating mb-3">
                  <input
                    type="text"
                    class="form-control"
                    id="nome"
                    name="nome"
                    placeholder="Nome Completo"
                    required
                  />
                  <label for="nome">Nome Completo</label>
                </div>

                <div class="form-floating mb-3">
                  <input
                    type="email"
                    class="form-control"
                    id="email"
                    name="email"
                    placeholder="seu@email.com"
                    required
                  />
                  <label for="email">Seu melhor E-mail</label>
                </div>

                <div class="form-floating mb-3">
                  <input
                    type="tel"
                    class="form-control"
                    id="telefone"
                    name="telefone"
                    placeholder="(11) 99999-9999"
                  />
                  <label for="telefone">Telefone (Opcional)</label>
                </div>

                <div class="form-floating mb-3">
                  <input
                    type="password"
                    class="form-control"
                    id="senha"
                    name="senha"
                    placeholder="Senha"
                    required
                  />
                  <label for="senha"
                    >Crie uma Senha</label
                  >
                </div>

                <div class="form-floating mb-3">
                  <input
                    type="password"
                    class="form-control"
                    id="confirmarSenha"
                    name="confirmarSenha"
                    placeholder="Confirme sua Senha"
                    required
                  />
                  <label for="confirmarSenha">Confirme sua Senha</label>
                </div>

                <div class="form-check mb-4">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    value=""
                    id="termos"
                    required
                  />

                  <label class="form-check-label" for="termos">
                    Eu li e aceito os <a href="termos.html">Termos de Uso</a> e
                    a
                    <a href="privacidade.html">Política de Privacidade</a>
                    (TCLE).
                  </label>
                </div>

                <div class="d-grid">
                  <button type="submit" class="btn btn-primary btn-lg py-3">
                    Criar Minha Conta
                  </button>
                </div>
              </form>

              <hr class="my-4" />
              <p class="text-center">
                Já tem uma conta? <a href="login.html">Faça seu login aqui</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/cadastro.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
