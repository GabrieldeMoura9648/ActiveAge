<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Active Age - Recuperar Senha</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link href="css/style.css" rel="stylesheet" />

    <style>
      .form-floating > .form-control:not(:placeholder-shown) ~ label,
      .form-floating > .form-control:-webkit-autofill ~ label,
      .form-floating > .form-select ~ label {
        transform: scale(0.85) translateY(-0.5rem) translateX(0.15rem);
      }
    </style>
  </head>
  <body class="bg-light d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg bg-white shadow-sm py-3">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="index.html">
          <img
            src="img/logo.png"
            alt="Active Age Logo"
            height="100"
            class="me-2"
          />
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div
          class="collapse navbar-collapse justify-content-end"
          id="navbarNav"
        >
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="btn btn-outline-secondary" href="login.html"
                >Fazer Login</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container my-auto py-5">
      <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
          <h1 class="mb-4 fw-bold text-center">Recuperar Senha</h1>
          <p class="text-center text-muted mb-5">
            Informe o e-mail cadastrado em sua conta para receber as instruções
            de recuperação.
          </p>

          <div class="card shadow-sm border-0" style="border-radius: 15px">
            <div class="card-body p-4 p-md-5">
              <form>
                <div class="form-floating mb-4">
                  <input
                    type="email"
                    class="form-control"
                    id="emailRecuperacao"
                    name="emailRecuperacao"
                    placeholder="seu@email.com"
                    required
                  />
                  <label for="emailRecuperacao">E-mail Cadastrado</label>
                </div>

                <div class="d-grid gap-2 mb-3">
                  <button type="submit" class="btn btn-primary btn-lg py-3">
                    Enviar Instruções
                  </button>
                </div>
                <div class="text-center">
                  <a href="login.html" class="text-decoration-none"
                    >Lembrei minha senha, voltar para o login</a
                  >
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <footer class="footer mt-auto py-4 bg-white shadow-sm">
      <div class="container text-center">
        <span class="text-muted"
          >&copy; 2025 Active Age. Todos os direitos reservados.</span
        >
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
