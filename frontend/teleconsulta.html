<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Active Age - Sala de Consulta</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link href="css/style.css" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-white shadow-sm py-3">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="index.html">
          <img
            src="img/logo.png"
            alt="Active Age Logo"
            height="100"
            class="me-2"
          />
        </a>
        <div
          class="collapse navbar-collapse justify-content-end"
          id="navbarNav"
        >
          <ul class="navbar-nav"></ul>
        </div>
      </div>
    </nav>

    <div class="container my-5">
      <div classs="row justify-content-center">
        <div class="col-lg-10 mx-auto">
          <div class="card shadow-sm border-0" style="border-radius: 15px">
            <div class="card-body p-4 p-md-5 text-center">
              <h1 class="h3 mb-3" style="color: var(--aa-brown)">
                Sala de Teleconsulta
              </h1>
              <p class="fs-5 text-muted">
                Consulta ID: <span id="id-agendamento">...</span>
              </p>

              <div class="alert alert-info mt-4">
                <i
                  class="bi bi-camera-video-fill fs-1"
                  style="color: var(--aa-orange)"
                ></i>
                <h2 class="h4 mt-3">Consulta em Andamento</h2>
              </div>

              <div class="mt-4">
                <p id="info-paciente" class="fs-5"></p>
                <p id="info-medico" class="fs-5"></p>
              </div>

              <a href="dashboard.html" class="btn btn-danger btn-lg mt-4">
                Sair da Consulta e Voltar ao Painel
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const urlParams = new URLSearchParams(window.location.search);
        const idAgendamento = urlParams.get("id");
        if (idAgendamento) {
          document.getElementById("id-agendamento").innerText = idAgendamento;
        }
        const usuario = JSON.parse(localStorage.getItem("activeAgeUser"));
        if (usuario.tipoPerfil === "MEDICO") {
          document.getElementById(
            "info-medico"
          ).innerText = `Médico: ${usuario.nome}`;
        } else {
          document.getElementById(
            "info-paciente"
          ).innerText = `Paciente: ${usuario.nome}`;
        }
      });
    </script>
  </body>
</html>
