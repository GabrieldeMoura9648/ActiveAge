<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Active Age - Login</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link href="css/style.css" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-white shadow-sm">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="index.html">
          <img
            src="img/logo.png"
            alt="Active Age Logo"
            height="100"
            class="me-2"
          />
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div
          class="collapse navbar-collapse justify-content-end"
          id="navbarNav"
        >
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="btn btn-primary" href="cadastro.html">Cadastre-se</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container my-5">
      <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
          <h1 class="text-center mb-4">Acesse sua Conta</h1>
          <p class="text-center fs-5 mb-4">
            Bem-vindo(a) de volta! Insira seus dados para continuar.
          </p>

          <div class="card shadow-sm border-0" style="border-radius: 15px">
            <div class="card-body p-4 p-md-5">
              <form id="formLogin" action="/api/login" method="POST">
                <div class="form-floating mb-3">
                  <input
                    type="email"
                    class="form-control"
                    id="email"
                    name="email"
                    placeholder="seu@email.com"
                    required
                  />
                  <label for="email">E-mail</label>
                </div>

                <div class="form-floating mb-3">
                  <input
                    type="password"
                    class="form-control"
                    id="senha"
                    name="senha"
                    placeholder="Senha"
                    required
                  />
                  <label for="senha">Senha</label>
                </div>

                <div class="d-grid gap-2">
                  <button type="submit" class="btn btn-primary btn-lg py-3">
                    Entrar
                  </button>
                  <a
                    href="esqueceu-senha.html"
                    class="btn btn-link text-center"
                    style="color: var(--aa-green)"
                    >Esqueceu sua senha?</a
                  >
                </div>
              </form>

              <hr class="my-4" />
              <p class="text-center">
                Não tem uma conta?
                <a href="cadastro.html">Crie sua conta aqui</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/login.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
